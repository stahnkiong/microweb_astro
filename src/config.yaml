site:
  name: MicroWeb
  site: 'https://www.microweb.my'
  base: '/'
  trailingSlash: true

  googleSiteVerificationId: google-site-verification=AuOwWyzbRWHSJrMw4w6MUrkeA9xgva3sTcXMBvMpDAE

# Default SEO metadata
metadata:
  title:
    default: App Developer, Custom Software & Web Design
    template: '%s | MicroWeb Sarawak'
  description: 'Top-tier app development, enterprise software engineering, and high-performance web design in Kuching & KL. We architect zero-management digital infrastructure and secure WhatsApp-to-ERP pipelines across Malaysia.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: MicroWeb
    images:
      - url: '~/assets/images/web_design_discussion.webp'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 20

    post:
      isEnabled: true
      permalink: '/clients/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'clients' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: G-GM5ZSBEGN2
      partytown: false

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
